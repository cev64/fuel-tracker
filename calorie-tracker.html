<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0f0f0f" />
<title>Fuel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --surface3: #2e2e2e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #c8f060;
    --accent2: #a8d440;
    --accent-dim: rgba(200,240,96,0.12);
    --red: #ff5c5c;
    --blue: #5cb8ff;
    --orange: #ffaa5c;
    --radius: 16px;
    --radius-sm: 10px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    overscroll-behavior: none;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Header */
  .app-header {
    padding: calc(var(--safe-top) + 20px) 20px 0;
    flex-shrink: 0;
  }

  .wordmark {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .wordmark span {
    color: var(--accent);
  }

  /* Tab Bar */
  .tab-bar {
    display: flex;
    gap: 4px;
    padding: 16px 20px 0;
    flex-shrink: 0;
  }

  .tab-btn {
    flex: 1;
    padding: 9px 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.01em;
  }

  .tab-btn.active {
    background: var(--accent);
    color: #0f0f0f;
    border-color: var(--accent);
    font-weight: 600;
  }

  /* Content */
  .tab-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px calc(var(--safe-bottom) + 20px);
    display: none;
  }

  .tab-content.active { display: block; }

  /* Log Tab */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
  }

  .form-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 16px;
  }

  .input-group {
    margin-bottom: 12px;
  }

  .input-group label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .input-group input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .input-group input::placeholder { color: var(--text3); }

  .input-group input:focus {
    border-color: var(--accent);
    background: var(--surface3);
  }

  .macros-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .macro-input label { font-size: 11px; }

  .macro-input input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--text);
    outline: none;
    text-align: center;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .macro-input input::placeholder { color: var(--text3); font-size: 14px; }
  .macro-input input:focus { border-color: var(--accent); background: var(--surface3); }

  .macro-input .macro-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: block;
    text-align: center;
    margin-bottom: 6px;
  }

  .btn-submit {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-appearance: none;
  }

  .btn-submit:active { transform: scale(0.98); background: var(--accent2); }

  /* Today Tab */
  .day-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .day-nav-btn {
    width: 38px;
    height: 38px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    font-size: 18px;
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .day-nav-btn:active { background: var(--surface3); }

  .day-label-wrap { text-align: center; }

  .day-label-main {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .day-label-sub {
    font-size: 12px;
    color: var(--text2);
    margin-top: 1px;
  }

  .totals-strip {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .total-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 10px;
    text-align: center;
  }

  .total-tile.cals { border-color: rgba(255,90,90,0.25); }
  .total-tile.prot { border-color: rgba(92,184,255,0.25); }
  .total-tile.fib  { border-color: rgba(200,240,96,0.25); }

  .tile-val {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .total-tile.cals .tile-val { color: var(--red); }
  .total-tile.prot .tile-val { color: var(--blue); }
  .total-tile.fib  .tile-val { color: var(--accent); }

  .tile-label {
    font-size: 11px;
    color: var(--text2);
    margin-top: 4px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .food-log-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .food-log-title {
    padding: 14px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
  }

  .food-item {
    display: flex;
    align-items: center;
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .food-item:last-child { border-bottom: none; }

  .food-info { flex: 1; min-width: 0; }

  .food-name {
    font-weight: 500;
    font-size: 15px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .food-macros {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
    display: flex;
    gap: 8px;
  }

  .food-macros .m-cal { color: var(--red); opacity: 0.8; }
  .food-macros .m-pro { color: var(--blue); opacity: 0.8; }
  .food-macros .m-fib { color: var(--accent); opacity: 0.8; }

  .btn-del {
    width: 30px;
    height: 30px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text3);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .btn-del:active { background: rgba(255,92,92,0.15); border-color: var(--red); color: var(--red); }

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text3);
    font-size: 14px;
  }

  .empty-icon {
    font-size: 32px;
    margin-bottom: 10px;
    opacity: 0.4;
    display: block;
  }

  /* Calendar Tab */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .cal-nav-btn {
    width: 38px;
    height: 38px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    font-size: 18px;
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .cal-nav-btn:active { background: var(--surface3); }

  .cal-month-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .cal-grid-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
  }

  .cal-dow-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 6px;
  }

  .cal-dow {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.05em;
    padding: 4px 0;
  }

  .cal-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-cell {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1px solid transparent;
    padding: 5px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  .cal-cell:not(.empty):hover { border-color: var(--border2); background: var(--surface2); }
  .cal-cell:not(.empty):active { background: var(--surface3); }

  .cal-cell.today {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .cal-cell.has-data {
    background: var(--surface2);
    border-color: var(--border);
  }

  .cal-cell.today.has-data { border-color: var(--accent); }

  .cal-day-num {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--text2);
    line-height: 1;
  }

  .cal-cell.today .cal-day-num { color: var(--accent); }

  .cal-cals-label {
    font-size: 9px;
    font-weight: 600;
    color: var(--red);
    margin-top: 2px;
    opacity: 0.85;
    line-height: 1;
  }

  .cal-dots {
    display: flex;
    gap: 2px;
    margin-top: 3px;
    justify-content: center;
  }

  .cal-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
  }

  .dot-c { background: var(--red); }
  .dot-p { background: var(--blue); }
  .dot-f { background: var(--accent); }

  .cal-legend {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-top: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text2);
  }

  .legend-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(var(--safe-bottom) + 20px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #0f0f0f;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.03em;
    padding: 10px 20px;
    border-radius: 50px;
    opacity: 0;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Scrollbar */
  .tab-content::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div id="app">
  <div class="app-header">
    <div class="wordmark">fuel<span>.</span></div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('log')">Log</button>
    <button class="tab-btn" onclick="switchTab('today')">Today</button>
    <button class="tab-btn" onclick="switchTab('calendar')">Calendar</button>
  </div>

  <!-- LOG TAB -->
  <div class="tab-content active" id="tab-log">
    <div class="form-card">
      <h2>Add food</h2>
      <div class="input-group">
        <label>Food item</label>
        <input type="text" id="f-name" placeholder="e.g. Chicken breast" autocomplete="off" autocorrect="off" />
      </div>
      <div class="macros-grid">
        <div class="macro-input">
          <span class="macro-label">Cals</span>
          <input type="number" id="f-cal" placeholder="0" min="0" inputmode="decimal" />
        </div>
        <div class="macro-input">
          <span class="macro-label">Protein g</span>
          <input type="number" id="f-pro" placeholder="0" min="0" inputmode="decimal" />
        </div>
        <div class="macro-input">
          <span class="macro-label">Fiber g</span>
          <input type="number" id="f-fib" placeholder="0" min="0" inputmode="decimal" />
        </div>
      </div>
      <button class="btn-submit" onclick="addFood()">Add to log</button>
    </div>
  </div>

  <!-- TODAY TAB -->
  <div class="tab-content" id="tab-today">
    <div class="day-nav">
      <button class="day-nav-btn" onclick="changeDay(-1)">&#8249;</button>
      <div class="day-label-wrap">
        <div class="day-label-main" id="day-main"></div>
        <div class="day-label-sub" id="day-sub"></div>
      </div>
      <button class="day-nav-btn" onclick="changeDay(1)">&#8250;</button>
    </div>

    <div class="totals-strip">
      <div class="total-tile cals">
        <div class="tile-val" id="t-cal">0</div>
        <div class="tile-label">kcal</div>
      </div>
      <div class="total-tile prot">
        <div class="tile-val" id="t-pro">0</div>
        <div class="tile-label">protein</div>
      </div>
      <div class="total-tile fib">
        <div class="tile-val" id="t-fib">0</div>
        <div class="tile-label">fiber</div>
      </div>
    </div>

    <div class="food-log-card">
      <div class="food-log-title">Items logged</div>
      <div id="food-list"></div>
    </div>
  </div>

  <!-- CALENDAR TAB -->
  <div class="tab-content" id="tab-calendar">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">&#8249;</button>
      <div class="cal-month-title" id="cal-month-title"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="cal-grid-wrap">
      <div class="cal-dow-row">
        <div class="cal-dow">Su</div><div class="cal-dow">Mo</div><div class="cal-dow">Tu</div>
        <div class="cal-dow">We</div><div class="cal-dow">Th</div><div class="cal-dow">Fr</div>
        <div class="cal-dow">Sa</div>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>
    <div class="cal-legend">
      <div class="legend-item"><div class="legend-dot dot-c"></div> Calories</div>
      <div class="legend-item"><div class="legend-dot dot-p"></div> Protein</div>
      <div class="legend-item"><div class="legend-dot dot-f"></div> Fiber</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let db = {};
  let viewDate = new Date();
  let calMonth = new Date();

  const fmtKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const todayKey = () => fmtKey(new Date());
  const pad = n => String(n).padStart(2,'0');

  function save() {
    try { localStorage.setItem('fuel_v1', JSON.stringify(db)); } catch(e) {}
  }
  function load() {
    try {
      const s = localStorage.getItem('fuel_v1');
      if (s) db = JSON.parse(s);
    } catch(e) {}
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1800);
  }

  function switchTab(name) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    document.querySelectorAll('.tab-btn')[['log','today','calendar'].indexOf(name)].classList.add('active');
    if (name === 'today') renderToday();
    if (name === 'calendar') renderCalendar();
  }

  function addFood() {
    const name = document.getElementById('f-name').value.trim();
    const cal  = parseFloat(document.getElementById('f-cal').value)  || 0;
    const pro  = parseFloat(document.getElementById('f-pro').value)  || 0;
    const fib  = parseFloat(document.getElementById('f-fib').value)  || 0;
    if (!name) { toast('Enter a food name'); return; }

    const key = todayKey();
    if (!db[key]) db[key] = [];
    db[key].push({ id: Date.now(), name, cal, pro, fib });
    save();

    document.getElementById('f-name').value = '';
    document.getElementById('f-cal').value = '';
    document.getElementById('f-pro').value = '';
    document.getElementById('f-fib').value = '';
    document.getElementById('f-name').focus();
    toast('Added!');
  }

  function deleteItem(key, id) {
    if (!db[key]) return;
    db[key] = db[key].filter(i => i.id !== id);
    if (db[key].length === 0) delete db[key];
    save();
    renderToday();
  }

  function changeDay(dir) {
    viewDate = new Date(viewDate);
    viewDate.setDate(viewDate.getDate() + dir);
    renderToday();
  }

  function renderToday() {
    const key = fmtKey(viewDate);
    const isToday = key === todayKey();
    const items = db[key] || [];

    const labelMain = isToday ? 'Today' : viewDate.toLocaleDateString('en-US', { weekday: 'long' });
    const labelSub  = isToday
      ? viewDate.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
      : viewDate.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

    document.getElementById('day-main').textContent = labelMain;
    document.getElementById('day-sub').textContent  = labelSub;

    const totCal = items.reduce((s,i) => s+i.cal, 0);
    const totPro = items.reduce((s,i) => s+i.pro, 0);
    const totFib = items.reduce((s,i) => s+i.fib, 0);

    document.getElementById('t-cal').textContent = Math.round(totCal);
    document.getElementById('t-pro').textContent = Math.round(totPro);
    document.getElementById('t-fib').textContent = Math.round(totFib);

    const list = document.getElementById('food-list');
    if (!items.length) {
      list.innerHTML = `<div class="empty-state"><span class="empty-icon">🍽</span>Nothing logged yet</div>`;
      return;
    }

    list.innerHTML = items.map(i => `
      <div class="food-item">
        <div class="food-info">
          <div class="food-name">${escHtml(i.name)}</div>
          <div class="food-macros">
            <span class="m-cal">${Math.round(i.cal)} kcal</span>
            <span class="m-pro">${Math.round(i.pro)}g protein</span>
            <span class="m-fib">${Math.round(i.fib)}g fiber</span>
          </div>
        </div>
        <button class="btn-del" onclick="deleteItem('${key}', ${i.id})" aria-label="Delete">&#x2715;</button>
      </div>
    `).join('');
  }

  function changeMonth(dir) {
    calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth() + dir, 1);
    renderCalendar();
  }

  function renderCalendar() {
    const year = calMonth.getFullYear();
    const month = calMonth.getMonth();
    const todayK = todayKey();

    document.getElementById('cal-month-title').textContent =
      calMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

    const firstDow = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    let html = '';
    for (let i = 0; i < firstDow; i++) html += '<div class="cal-cell empty"></div>';

    for (let d = 1; d <= daysInMonth; d++) {
      const key = `${year}-${pad(month+1)}-${pad(d)}`;
      const items = db[key] || [];
      const hasData = items.length > 0;
      const totCal  = Math.round(items.reduce((s,i) => s+i.cal, 0));
      const totPro  = Math.round(items.reduce((s,i) => s+i.pro, 0));
      const totFib  = Math.round(items.reduce((s,i) => s+i.fib, 0));
      const isToday = key === todayK;

      let cls = 'cal-cell';
      if (isToday) cls += ' today';
      if (hasData) cls += ' has-data';

      const dots = hasData ? `<div class="cal-dots">
        ${totCal ? '<div class="cal-dot dot-c"></div>' : ''}
        ${totPro ? '<div class="cal-dot dot-p"></div>' : ''}
        ${totFib ? '<div class="cal-dot dot-f"></div>' : ''}
      </div>` : '';

      html += `<div class="${cls}" onclick="goToDay('${key}')">
        <div class="cal-day-num">${d}</div>
        ${hasData ? `<div class="cal-cals-label">${totCal}</div>` : ''}
        ${dots}
      </div>`;
    }

    document.getElementById('cal-days').innerHTML = html;
  }

  function goToDay(key) {
    const [y, m, d] = key.split('-').map(Number);
    viewDate = new Date(y, m - 1, d);
    switchTab('today');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Init
  load();
  viewDate = new Date();
  renderToday();
  renderCalendar();

  document.getElementById('f-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') addFood();
  });
</script>
</body>
</html>
